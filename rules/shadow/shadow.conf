[General]
# ========================================================================================================================
# Shadowrocket打开HTTPS解密方法：
# 1.点击配置文件ⓘ - HTTPS解密 - 证书 - 生成新的CA证书 - 安装证书。
# 2.手机设置 - 已下载描述文件 - 安装。
# 3.手机设置 - 通用 - 关于本机 - 证书信任设置 - 开启对应Shadowrocket证书信任。
# ------------------------------------------------------------------------------------------------
# ------------------------[旁路系统]---------------------------
# 在 iOS 系统中，有许多流量是属于系统核心服务的。最典型的代表就是 APNs（Apple Push Notification service，苹果推送通知服务）。
# 当收到邮件或各类 APP 的消息推送时，都是通过苹果的系统服务器统一分发到你手机上的。
# 当设置为 true 时（推荐）：小火箭会主动识别出所有属于 iOS 系统底层的核心服务流量，并直接放行，完全不让它们进入小火箭的代理内核。
# 当设置为 false 时（禁用）：小火箭会试图去接管和处理系统底层的流量。如果禁用此选项，可能会导致一些系统问题，如推送通知延迟。
bypass-system = true

# ------------------------[Skip Proxy]--------------------------
# 跳过代理。解决国内银行APP、国密证书、网银反作弊导致的无法联网兼容性问题。
# 流量会经过小火箭的底层虚拟网卡tun。但代理内核不做任何处理及规则匹配，直接透传放行，即让流量完全绕过小火箭的代理内核（Proxy Engine），直接由 iOS 系统底层的网络去处理。
# skip-proxy = localhost,*.local,captive.apple.com,*.ccb.com,*.abchina.com.cn,*.psbc.com,*.interactivebrokers.com,*.ibkr.com,*.ibllc.com,*.ibkr.info,*.moomoo.com,*.futunn.com,*.schwab.com,*.charlesschwab.com,*.thinkorswim.com
skip-proxy = localhost, *.local, captive.apple.com, *.ccb.com, *.abchina.com.cn, *.psbc.com, 127.0.0.1, 127.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 172.16.0.0/12, 100.64.0.0/10, 169.254.0.0/16, 192.168.0.0/16

# ------------------------[TUN Excluded Routes]-----------------
# TUN旁路路由。在系统底层将以下 IP 段排除在小火箭的管辖范围之外，即把这些IP排除在小火箭的 Tun 虚拟网卡之外。流量不走小火箭的网卡,直接由 iOS 原生网络发送,
# 用来保证局域网功能（投屏、打印机、智能家居）正常，不被小火箭干扰。
tun-excluded-routes = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.168.0.0/16,224.0.0.0/4,255.255.255.255/32,0.0.0.0/31,::ffff:0.0.0.0/31

# ------------------------[DNS覆写]------------------------------
# 使用普通DNS或加密DNS（如doh、doq、dot等）覆盖默认的系统DNS。有些dns over https支持http3，所以尝试查询，如果支持就切换到http3，可在doh链接后面加上#no-h3关闭。doh强制通过h3查询的写法是将“https”改成“h3”，如h3://dns.alidns.com/dns-query。
## dns-server = https://doh.pub/dns-query,https://dns.alidns.com/dns-query,223.5.5.5,119.29.29.29
# 优先使用DoQ,DNS over QUIC,基于 UDP/QUIC 的 DoQ 具有“无缝连接迁移”和“零 RTT 握手”的绝对优势，抗封锁和解析速度极快。
# 同时搭配了 IP 形式的 DoH：直接使用IP，避免了DNS解析DoH域名的过程，速度最快。
dns-server = quic://223.5.5.5,quic://223.6.6.6,https://120.53.53.53/dns-query,https://1.12.12.12/dns-query

# ------------------------[备用DNS]-----------------------------
# 当加密DNS因网络环境拦截，导致查询失败或查询时间超过2秒，自动回退system本地系统分配的DNS，能保证第一步顺利连上网络、弹出认证页面。
# 如需指定多个DNS，可用逗号分隔。
fallback-dns-server = 223.5.5.5,119.29.29.29

# ------------------------[IPv6策略]---------------------------
# 是否启用IPv6支持。（注：即使不启用此选项，当本地网络环境支持IPv6，并且节点域名支持IPv6解析，Shadowrocket也会使用节点的IPv6地址进行访问。解决方法是关闭节点域名的IPv6解析，或者在配置文件的[Host]项目下为节点域名指定IP地址。）
ipv6 = false
# 首选IPv6。优先向IPv6的DNS服务器查询AAAA记录，优先使用AAAA记录。false表示不启用。
prefer-ipv6 = false

# ------------------------[IPv6 环境严格判定]--------------------
# 保持默认设为 false。
# 作用：国内绝大多数网络均为 IPv4/IPv6 双栈环境。保持关闭可有效防止在弱网或 Wi-Fi 配置不规范时小火箭误判为 IPv6-Only 环境，避免导致代理整体瘫痪或断流。
# 当设置为 true 时，如果设备在网络环境中仅获取到 IPv6 的 DNS 而未获取到 IPv4 的 DNS，此时软件将认为网络环境是 IPv6 Only 网络...
ipv6-only-if-no-ipv4-dns = false

# ------------------------[直连 DNS 回退]-----------------------
# 是否让直连域名使用系统本地 DNS。保持 false，统一使用上方配置的干净加密 DNS。
dns-direct-system = false

# ------------------------[ICMP 自动回复]-----------------------
# 强烈建议关闭（false）。开启会导致 Ping 所有 IP 都显示 1ms（本地伪造应答），导致网络诊断工具失效，并可能引发部分游戏联机握手失败。# 
# 当小火箭接管网络（Tun 模式）后，如果在终端或某些检测工具里去 ping 一个海外被墙的网站 IP、或者一个根本不存在的局域网 IP时，
# 开启后，会在本地直接伪造一个 Ping 直接进行回复；关闭后，真正去网络上探测，网络通就通，不通就是 Request Timeout。
icmp-auto-reply = false

# ------------------------[始终拒绝重写]------------------------
# 不开启时，「重写的REJECT策略」默认只有在配置模式下生效。开启后，策略会在全局路由模式下生效。
# 在“配置模式（Config）”下，规则会正常生效去广告。false 能让全局模式保持“纯粹的全局抓取”状态，而不会参与重写规则，保证在底层全局下的网页正确
always-reject-url-rewrite = false

# ------------------------[私有 IP 应答]------------------------
# 必须开启（true）。允许域名解析返回局域网保留 IP。有效防止内网穿透、公司 VPN 域名被小火箭误判为“DNS 劫持”而导致连接失败。
# 如果不启用此选项，当域名解析返回私有IP时，Shadowrocket会认为该域名被劫持而强制使用代理。
private-ip-answer = true

# ------------------------[直连失败转代理]-----------------------
# 强烈建议关闭（false）。防止因国内网络偶发波动或 App 后台无效域名解析失败时，小火箭自动将大流量误转至代理节点，造成意外的代理流量消耗。
# 一个域名匹配了 DIRECT（直连），但可能因为国内网络抽风或者该网站倒闭了，DNS 无法解析。小火箭为了“兜底”，自动把这个域名转给代理节点
# App 瞎探测流量：很多国产 APP在后台运行时，会高频尝试连接一些已经废弃的、或者专门用来探测网络环境的内部测试域名（这些域名通常在国内已经解析不到了）。
# 一旦由于国内网络短暂波动，某个大文件的直连下载域名临时解析失败，小火箭会立马把这个大文件下载流量全部切到你的付费代理节点上。
# 直连域名解析失败后使用代理。false表示不启用。
dns-direct-fallback-proxy = false

# ------------------------[TUN 包含路由]-------------------------
# 除非有特定的跨地域内网穿透需求，否则无需手动添加小路由表。
# 默认情况下，Shadowrocket接口会声明自己为默认路由，但由于Wi-Fi接口的路由较小，有些流量可能不会通过Shadowrocket接口。使用此选项可以添加一个较小的路由表。
tun-included-routes = 

# ------------------------[DNS 劫持]----------------------------
# 强制拦截某些设备或软件中硬编码的 DNS 请求（如 Netflix 强行发往 Google DNS 的请求）。
# 拦截后统一交由小火箭 DNS 引擎处理，有效解决流媒体锁区、App 报网络错误或 DNS 泄漏问题。
# 推荐使用 *:53 实施全局无差别拦截，省心且彻底；或者精准指定常用公共 DNS。
##  hijack-dns = 8.8.8.8:53,8.8.4.4:53,1.1.1.1:53,1.0.0.1:53,9.9.9.9:53
# 能最大程度杜绝任何设备、任何 APP 的 DNS 泄漏和锁区问题。
hijack-dns = *:53

# ------------------------[UDP 节点不支持时的回退策略]-------------
# 当分流规则要求走代理的 UDP 流量（如 QUIC/HTTP3 视频、海外游戏语音）遇到了不支持 UDP 转发的节点时：
# 强烈推荐设为 REJECT（拒绝）。
# 优点：1. 严防真实 IP 泄漏导致海外账号被封或锁区；2. 强制海外 APP 自动降级回退到稳定的 TCP 模式，网页和视频加载速度更快。
# 当UDP流量匹配到规则里不支持UDP转发的节点策略时重新选择回退行为,DIRECT表示直连转发UDP流量，REJECT表示拒绝转发UDP流量。
udp-policy-not-supported-behaviour = REJECT

# ------------------------[网络兼容模式]-------------------------
# 。当参数的值设定为 3 时的效果等同于：设置 > 代理 > 代理类型 > None。
# compatibility-mode =

# ------------------------[配置包含]-----------------------------
# 引入本地或远程规则集。当前主配置的优先级最高。
# 这样既能保证你自定义的 DNS 和局部规则绝对优先，又能享受远程规则的自动更新。
# 包含配置。如“include=a.conf”表示当前配置包含另一个配置a.conf的内容，当前配置的优先级高于a.conf。此选项是对配置建立包含关系，以满足同时使用多个配置的需求。
include = 

# ------------------------[WebRTC 隐私保护（STUN 欺骗）]------------
# 目的：防止通过 WebRTC（如网页版音视频通话、特定风控脚本）绕过代理泄漏你的国内真实公网 IP。
# 原理：小火箭会劫持 STUN 响应，强行将你的真实公网 IP 替换为下方指定的本地回环地址。
# 强烈推荐填入 127.0.0.1 和 ::1，这是防范 TikTok、ChatGPT 等海外平台风控、防止锁区封号的终极安全手段。
# 允许返回一个虚假的IP地址，如“stun-response-ip=1.1.1.1”、“stun-response-ipv6=::1”，目的是防止真实IP地址泄漏，提高WebRTC的隐私和安全性。使用此命令将忽略软件设置选项内的 禁用STUN 的启用状态
# Disable STUN（禁用 STUN）简单粗暴，直接物理切断所有传统 STUN 探测，小火箭会在底层拦截并直接丢弃（Drop）所有发往外界 3478 端口（STUN 默认端口）的 UDP 探测包。
# stun-response-ip 是**“欺骗型/技术流”**：允许你发送，但在返回结果时把你的真实 IP 偷梁换柱成 127.0.0.1。
# Enable Relay（启用中继）将 P2P（端到端）直连强行转为 TURN 服务器中继。
# 在 WebRTC 规范中，如果两台设备因为防火墙或代理的原因，无法通过 STUN 获取真实公网 IP 进行直接连通（P2P），它们就会退而求其次，使用 TURN（中继）服务器。
# 开启此开关,小火箭会强制告诉 iOS 系统和浏览器：“当前网络无法建立 P2P 直连，所有音视频和实时数据必须通过中继服务器进行转发。
# 由于所有的连接都被迫变成了“中继模式”，WebRTC 流量就会老老实实地走小火箭的 Tun 虚拟网卡，从而强制走你的海外代理节点。
# 此时对方风控系统探测到的，就变成了你代理节点的服务器 IP，而不是你的中国真实 IP。
# 最佳实战配置组合（防风控、防封号终极方案）
# Enable Relay：开启（保持勾选）强迫所有实时音视频和高级网络探测全部进入中继模式，老老实实走小火箭的代理节点，这是最安全的。
# Disable STUN：关闭（不勾选）不要彻底禁用它。彻底禁用会导致 STUN 彻底死掉，有些 APP 会直接报错或触发“欺诈审计”。我们要允许它存活，但要在配置文件里“欺骗”它。
## 当一个海外风控极严的网站（如 ChatGPT、TikTok）尝试用 WebRTC 探测你时：
### 因为你没有勾选 Disable STUN，网站的 STUN 探测顺利发出了，风控系统觉得你的网络环境很自然、没有刻意隐藏的痕迹。
### 当 STUN 服务器把包含你国内真实 IP 的数据包返回时，小火箭在底层瞬间把 IP 掉包成了 127.0.0.1。
### 随后，因为你开启了 Enable Relay，接下来的所有核心通信全部被迫转为中继模式，顺理成章地通过小火箭的美国/海外节点发送出去。
### 风控系统拿到的是一个安全的本地回环地址和一个干净的海外节点 IP，风控绿灯直接放行，完美隐身。
stun-response-ip = 127.0.0.1
stun-response-ipv6 = ::1

# ------------------------[总是真实 IP]--------------------------
# 警告：日常请保持默认注释或空白（切勿填写 *），否则会破坏现代规则的 Fake-IP 加速机制，导致网页加载变慢、分流错乱。
# 仅在遇到某些银行 APP 或主机游戏联机因“假 IP”判定网络异常时，才将对应的特定域名写入下方（用逗号分隔）。
# 此选项要求Shadowrocket在TUN处理DNS请求时返回一个真实的IP地址而不是假的IP地址。
# 仅对已知存在假 IP 兼容性问题的特殊服务返回真实 IP
# 比如：下面填入了苹果服务、微软商城、索尼 PlayStation 联网以及中国建设银行的域名
always-real-ip = *.msftconnecttest.com, *.msftncsi.com, captive.apple.com, *.ess.apple.com, time.*.com, *.pool.ntp.org, *.ntp.tencent.com, *.ntp1.aliyun.com, *.ntp.ntsc.ac.cn, *.cn.ntp.org.cn, *.pub.3gppnetwork.org, *.jibecloud.net, ims.*, *.ims, *.epc.att.net, *.epc.att-idns.net,*.three.com.hk
# ------------------------[强制真实 IP 应答]-------------------
# 强烈建议保持默认关闭（false）。开启会全局破坏 Fake-IP 加速机制，导致分流错乱及解析变慢。
# 在启用 Fake-IP 模式时，如果遇到某些极少数绝对无法兼容 Fake-IP（虚假 IP）的特殊 App，小火箭会强迫对这些 App 的域名直接返回本地解析出的真实真实 IP 地址。
# 如果误设为 true，小火箭会退化成传统的本地解析模式。这会直接废掉你之前配置的阿里 DoQ / 腾讯 DoH 以及 Fake-IP 的全部加速和防污染优势，导致网页首次加载变慢，甚至引发 DNS 泄漏。
# 保持全局 Fake-IP 机制处于最高速、最防污染的状态（切勿设为 true）
always-ip-address = false

# ------------------------[QUIC 协议屏蔽策略]------------------
# 强烈推荐在中国环境设为 all-proxy。
# 作用：1. 针对走代理的海外流量（如YouTube）强制阻断 UDP/443 传输，促使 App 毫秒级回退到稳定的 TCP 模式，彻底解决国内运营商跨境 UDP 丢包、限速、视频转圈问题；
#       2. 对国内直连（DIRECT）流量完全不干预，保留国内 App 享受高带宽 HTTP/3 的极速体验。
# all-proxy 表示只对 走代理的连接 阻断 QUIC，直连连接（DIRECT）不会被干预；
# all 表示对所有连接（包括直连与代理）都屏蔽 QUIC，这会完全禁止系统中一切 UDP/443 流量；
# always-allow 表示始终允许 QUIC，不做任何屏蔽，等同于 关闭 QUIC 屏蔽
block-quic = all-proxy

# ------------------------[代理链熔断保护]------------------
# 强烈推荐设为 true。一旦中转节点挂了，小火箭为了让你能继续上网，会自作聪明地绕过中转，让你的手机直接去尝试连接海外的落地节点。从而海外落地节点 IP 瞬间被墙，甚至封号或风控锁区
# 作用：当中转/链式代理中的某个中转节点意外断连时，立刻强制掐断该连接（REJECT）。
# 优势：严防小火箭绕过中转直接去连海外落地，从而暴露真实行为，能有效防止节点被墙、防止海外账号因IP突变被风控封号。
close-if-proxy-chain-missing = true

# ------------------------[本地 HOST 映射对代理生效]--------------
# 日常使用保持默认关闭（false）。（普通科学上网用户）
# 确保所有走代理的海外域名始终在远端服务器执行 DNS 解析，100% 杜绝国内 DNS 污染，且能完美享受 Fake-IP 带来的极速上网体验。
use-local-host-item-for-proxy = false
# 高阶用户推荐设为 true。（开发者、内网穿透、或玩自建节点的高阶用户）
# 作用：允许小火箭在处理代理连接时，优先读取配置文件中 [Host] 段落的本地映射。
# 优势：解决企业内网域名、特定开发测试域名通过代理访问时无法被远端解析的兼容性问题。

# ------------------------[允许 DNS SVCB/HTTPS 查询]--------------
# 强烈推荐在中国日常网络环境下保持关闭（false）。
# 在 iOS 14 及之后的系统中，苹果引入了SVCB/HTTPs类型的dns查询，
# 作用是让浏览器在请求 IP 的同时，把服务器支持的协议（比如 HTTP/3、是否加密连接）等一并查出来，从而减少后续握手的次数，加速网页打开。
# 作用：强制拦截 iOS 系统的 SVCB/HTTPS 新型 DNS 查询，促使系统降级回退到标准的 A 记录查询。
# 优势：1. 完美保护现代分流规则的 Fake-IP 加速机制不被破坏，防止分流错乱；2. 有效阻止因新型加密 DNS 记录暴露引发的运营商底层 SNI 阻断与断流。
allow-dns-svcb = false

# ------------------------[允许所有 DNS 查询类型正常转发]--------------
# 强烈推荐在中国网络环境下设为 false（关闭）。
# 作用：除 A/AAAA（解析 IP）外，强行将 HTTPS、SVCB、TXT、SRV 等其他所有特殊 DNS 查询在本地拦截并返回空值。
# 优势：1. 强制系统退回最纯粹的 A 记录模式，让小火箭 100% 接管流量，彻底杜绝分流规则乱套或失效；
#       2. 有效拦截 ECH 等特殊加密握手提示，防止国内运营商实施 SNI 阻断而导致的网页卡死断流。
# 设置为 true 时，小火箭只对发往 google.com 的 A（IPv4）和 AAAA（IPv6）记录查询进行拦截并返回 Fake-IP。
# 对于系统发起的其他TXT记录，SRV记录,HTTPS / SVCB 记录, 选择“放行”，允许它们直接去询问你的上游加密 DNS（dns-server）。
# 但是在完全干净、自由的海外网络环境下，这样能保证所有的互联网高级特性、企业级服务的特殊 DNS 验证 100% 兼容。
# 在中国如果设置true，很多海外网站通过HTTPS/SVCB/TXT记录顺便传输ECH（Encrypted Client Hello，加密客户机提示）密钥，触发gfw风控，断网
# 现代App（包括部分系统原生组件、海外大厂客户端）发现A记录返回的是Fake-IP（198.18.x.x），它为了“防中间人劫持”，会高频发起其它的特殊DNS查询（如TXT记录或特定SRV记录）去重新探测。
# App通过这些特殊记录成功绕过了小火箭A记录屏障，拿到了目标网站的海外真实IP，可能就直接走直连出海，瞬间被墙拦截，或者导致分流规则直接“打架失效”。
allow-dns-all = false

# ========================================================================================================================
[Proxy]
# 添加本地节点。该项目的节点解析是为了兼容部分配置文件，不能当作Shadowrocket添加节点的优先选择。
# Shadowsocks类型：
# 节点名称=ss,地址,端口,password=密码,其他参数(如method=aes-256-cfb,obfs=websocket,plugin=none)
# Vmess类型：
# 节点名称=vmess,地址,端口,password=密码,其他参数(如alterId=0,method=auto,obfs=websocket,tfo=1)
# VLESS类型：
# 节点名称=vless,地址,端口,password=密码,tls=true,其他参数(如obfs=websocket,peer=example.com)
# HTTP/HTTPS/Socks5/Socks5 Over TLS等类型：
# 节点名称=http,地址,端口,用户,密码
# 节点名称=socks5,地址,端口,用户,密码
# 节点名称=socks5-tls,地址,端口,用户,密码,skip-common-name-verify=true
# Trojan类型：
# 节点名称=trojan,地址,端口,password=密码,其他参数(如allowInsecure=1,peer=example.com)
# Hysteria类型：
# 节点名称=hysteria,地址,端口,auth=密码,obfsParam=混淆,protocol=协议,udp=1,其他参数(如peer=example.com,alpn=h2,upmbps=100,downmbps=100)
# Hysteria2类型：
# 节点名称=hysteria2,地址,端口,auth=密码,obfsParam=混淆,udp=1,其他参数(如peer=example.com,alpn=h3)
# TUIC类型：
# 节点名称=tuic,地址,端口,password=密码,udp=1,其他参数(如user=uuid值,peer=example.com,alpn=h2)
# Juicity类型：
# 节点名称=juicity,地址,端口,password=密码,udp=1,其他参数(如user=uuid值,peer=example.com,alpn=h2)
# WireGuard类型：
# 节点名称=wireguard,地址,端口,privateKey=私钥,publicKey=公钥,ip=子网IP,udp=1,其他参数(如dns=1.1.1.1,mtu=1350,keepalive=40,reserved=1/2/3)
# Snell类型：
# 节点名称=snell,地址,端口,password=密码,udp=1,其他参数(如obfs=http,obfs-host=example.com,obfs-uri=/abc)
  
# ========================================================================================================================
[Proxy Group]
# 代理分组类型：
# select:手动切换节点。
# url-test:自动切换延迟最低节点。
# random:随机使用分组里的不同节点进行连接。
# ------------------------------------------------------------
# policy-regex-filter表示正则式或关键词筛选，常用写法：
# 保留节点名称含有关键词A和B的节点:
# (?=.*(A))^(?=.*(B))^.*$
# 保留节点名称含有关键词A或B的节点:
# A|B
# 排除节点名称含有关键词A或B的节点:
# ^((?!(A|B)).)*$
# 保留节点名称含有关键词A并排除含有关键词B的节点:
# (?=.*(A).)^((?!(B)).)*$
# ------------------------------------------------------------
# 代理分组其他设置参数：
# interval:指定间隔多长时间后需要重新发起测试。
# timeout:如果测试在超时前未完成，放弃测试。
# tolerance:只有当新优胜者的分数高于旧优胜者的分数加上公差时，才会进行线路更换。
# url:指定要测试的URL。
# ------------------------------------------------------------
# 不含正则筛选的代理分组，示例：
# 名称=类型(如select,url-test,fallback,load-balance,random),策略(如direct,proxy,订阅名称,代理分组,节点),interval=测试周期,timeout=超时时间,tolerance=公差,policy-select-name=指定选择的节点备注名称,select=默认策略(0表示第一个策略,1表示第二个策略,2表示第三个策略……),url=测试地址
# 含正则筛选的代理分组，示例：
# 名称=类型(如select,url-test,fallback,load-balance,random),policy-regex-filter=正则式或关键词筛选,interval=测试周期,timeout=超时时间,tolerance=公差,policy-select-name=指定选择的节点备注名称,select=默认策略(0表示第一个策略,1表示第二个策略,2表示第三个策略……),url=测试地址
# 开启订阅筛选的代理分组，示例：
# 名称=类型(如select,url-test,fallback,load-balance,random),订阅名称(多个订阅时,用逗号分隔),use=true,policy-regex-filter=正则式或关键词筛选(省略该参数时,表示匹配对应订阅的全部节点),interval=测试周期,timeout=超时时间,tolerance=公差,policy-select-name=指定选择的节点备注名称,select=默认策略(0表示第一个策略,1表示第二个策略,2表示第三个策略……),url=测试地址
# use=true 开启订阅 select=0,选择顺序
# ------------------------------------------------------------
