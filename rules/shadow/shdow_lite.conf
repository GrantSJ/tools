[General]
# ========================================================================================================================
# 极简模式：仅 YouTube, Google 几个主要的app 走代理，其余全部直连
# ========================================================================================================================
bypass-system = true
skip-proxy = localhost, *.local, captive.apple.com, *.ccb.com, *.abchina.com.cn, *.psbc.com, 127.0.0.1, 127.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 172.16.0.0/12, 100.64.0.0/10, 169.254.0.0/16, 192.168.0.0/16
tun-excluded-routes = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.168.0.0/16,224.0.0.0/4,255.255.255.255/32,0.0.0.0/31,::ffff:0.0.0.0/31
dns-server = quic://223.5.5.5,quic://223.6.6.6,https://120.53.53.53/dns-query,https://1.12.12.12/dns-query
fallback-dns-server = 223.5.5.5,119.29.29.29
ipv6 = false
prefer-ipv6 = false
ipv6-only-if-no-ipv4-dns = false
dns-direct-system = false
icmp-auto-reply = false
always-reject-url-rewrite = false
private-ip-answer = true
dns-direct-fallback-proxy = false
tun-included-routes = 
hijack-dns = *:53
udp-policy-not-supported-behaviour = REJECT
always-real-ip = *.msftconnecttest.com, *.msftncsi.com, captive.apple.com, *.ess.apple.com, time.*.com, *.pool.ntp.org, *.ntp.tencent.com, *.ntp1.aliyun.com, *.ntp.ntsc.ac.cn, *.cn.ntp.org.cn, *.pub.3gppnetwork.org, *.jibecloud.net, ims.*, *.ims, *.epc.att.net, *.epc.att-idns.net, wlan.three.com.hk
always-ip-address = false
block-quic = all-proxy
close-if-proxy-chain-missing = true
use-local-host-item-for-proxy = false
allow-dns-svcb = false
allow-dns-all = false
stun-response-ip = 127.0.0.1
stun-response-ipv6 = ::1

# ========================================================================================================================
[Proxy]

# ========================================================================================================================
[Proxy Group]
香港 = select,HongX,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=HK|Hong|hong|香港
香港_mt = select,mitce,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=HK|Hong|hong|香港
澳洲 = url-test,HongX,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=AU|澳大利亚|澳洲
美国GC = select,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=us1-instance
美国HM = select,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=home-us
台湾 = select,HongX,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=TW|台湾
台湾_mt = select,mitce,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=TW|台湾
新加坡 = url-test,HongX,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=SG|Sing|sing|新加坡
新加坡_mt = url-test,mitce,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=SG|Sing|sing|新加坡
德国 = url-test,HongX,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=DE|德国
英国 = url-test,HongX,use=true,interval=600,tolerance=100,timeout=5,url=http://latency-test.skk.moe/endpoint,policy-regex-filter=UK|英国
# 只保留 YouTube 和 Google 用到的代理组
Youtube = select,澳洲,美国GC,美国HM,香港,台湾_mt,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
OpenAI = select,美国GC,澳洲,美国HM,香港,台湾_mt,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
Gemini = select,美国GC,美国HM,台湾,台湾_mt,澳洲,德国,select=0,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
X = select,美国GC,美国HM,台湾_mt,澳洲,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
Paypal = select,香港,美国GC,美国HM,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
eBay = select,美国GC,美国HM,德国,澳洲,新加坡,日本,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
Whatsapp = select,香港,台湾,台湾_mt,澳洲,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
binance = select,DIRECT,台湾_mt,香港,香港_mt,新加坡,新加坡_mt,澳洲,日本,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
okx = select,binance,台湾_mt,香港,香港_mt,新加坡,新加坡_mt,澳洲,日本,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
bitget = select,binance,台湾_mt,香港,香港_mt,新加坡,新加坡_mt,澳洲,日本,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
bybit = select,binance,台湾_mt,德国,英国,香港,香港_mt,新加坡,新加坡_mt,澳洲,日本,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
Google = select,Gemini,香港,澳洲,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
Telegram = select,台湾_mt,新加坡,新加坡_mt,美国GC,美国HM,香港,香港_mt,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint
漏网之鱼 = select,DIRECT,台湾_mt,美国GC,美国HM,新加坡,新加坡_mt,香港,香港_mt,德国,英国,澳洲,interval=86400,timeout=5,select=0,url=http://latency-test.skk.moe/endpoint

